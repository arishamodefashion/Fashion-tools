 let currentSearch = "";
let activePopup = null;
let scrollCloseListener = null;

function initParticles() {
  const container = document.getElementById('particleContainer');
  if (!container) return;
  const count = window.innerWidth < 700 ? 8 : 14;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 24 + 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 12 + 's';
    p.style.animationDuration = 10 + Math.random() * 14 + 's';
    container.appendChild(p);
  }
}

function safeOpenUrl(url) {
  let finalUrl = url.trim();
  if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;
  const win = window.open(finalUrl, '_blank');
  if (win) win.opener = null;
}

function closePopup() {
  if (activePopup) activePopup.remove();
  activePopup = null;
  if (scrollCloseListener) window.removeEventListener('scroll', scrollCloseListener);
  document.removeEventListener('click', outsideClickHandler);
}

function outsideClickHandler(e) {
  if (activePopup && !activePopup.contains(e.target)) closePopup();
}

function showLearnPopup(toolName, event) {
  if (activePopup) closePopup();
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(toolName + " tutorial how to use")}`;
  const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(toolName + " how to use guide")}`;
  const popup = document.createElement('div');
  popup.className = 'simple-popup';
  popup.innerHTML = `<div class="popup-item" data-type="yt">🎬 YouTube Tutorials</div><div class="popup-item" data-type="gg">🔍 Google Search</div>`;
  const btn = event.target.closest('.learn-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    let left = rect.left, top = rect.bottom + 4;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.transform = 'none';
    setTimeout(() => {
      const pr = popup.getBoundingClientRect();
      if (pr.right > window.innerWidth) popup.style.left = window.innerWidth - pr.width - 8 + 'px';
      if (pr.bottom > window.innerHeight) popup.style.top = rect.top - pr.height - 4 + 'px';
    }, 0);
  } else {
    popup.style.left = '50%';
    popup.style.top = '50%';
    popup.style.transform = 'translate(-50%, -50%)';
  }
  popup.querySelector('[data-type="yt"]').onclick = (e) => { e.stopPropagation(); window.open(ytUrl, '_blank'); closePopup(); };
  popup.querySelector('[data-type="gg"]').onclick = (e) => { e.stopPropagation(); window.open(googleUrl, '_blank'); closePopup(); };
  document.body.appendChild(popup);
  activePopup = popup;
  scrollCloseListener = () => closePopup();
  window.addEventListener('scroll', scrollCloseListener, { passive: true });
  setTimeout(() => {
    document.addEventListener('click', outsideClickHandler);
    const esc = (e) => { if (e.key === 'Escape') closePopup(); document.removeEventListener('keydown', esc); };
    document.addEventListener('keydown', esc);
    popup._esc = esc;
  }, 0);
}

function getFiltered() {
  if (!currentSearch.trim()) return fashionTools;
  const q = currentSearch.toLowerCase();
  return fashionTools.filter(t => t.name.toLowerCase().includes(q) || t.purpose.toLowerCase().includes(q));
}

function renderCards() {
  const filtered = getFiltered();
  const container = document.getElementById('toolsContainer');
  const statsSpan = document.getElementById('statsBar');
  if (statsSpan) statsSpan.innerHTML = `🎯 ${filtered.length} resources • ${currentSearch ? 'filtered results' : 'AI + trend + brands'}`;
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-3d">🌟 No matching fashion resource 🌟<br><span style="font-size:0.65rem;">Try a different keyword</span></div>`;
    return;
  }
  let html = `<div class="tools-grid">`;
  filtered.forEach(t => {
    const safeName = escapeHtml(t.name);
    const safePurpose = escapeHtml(t.purpose);
    html += `<div class="card" data-url="${escapeAttr(t.url)}">
      <div class="card-header"><div class="card-icon">${t.icon}</div><div class="card-name">${safeName}</div></div>
      <div class="card-purpose">🎯 ${safePurpose}</div>
      <div class="card-tutorial"><button class="learn-btn" data-tool="${safeName.replace(/&quot;/g, '\\"')}">📘 How to use</button></div>
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}
function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function bindEvents() {
  const container = document.getElementById('toolsContainer');
  if (!container) return;
  container.addEventListener('click', (e) => {
    const card = e.target.closest('.card');
    if (card && !e.target.closest('.learn-btn')) {
      const url = card.getAttribute('data-url');
      if (url) safeOpenUrl(url);
      return;
    }
    const btn = e.target.closest('.learn-btn');
    if (btn) {
      e.stopPropagation();
      const tool = btn.getAttribute('data-tool');
      if (tool) showLearnPopup(tool, e);
    }
  });
}

function initSearch() {
  const input = document.getElementById('search');
  if (!input) return;
  input.addEventListener('input', (e) => { currentSearch = e.target.value; renderCards(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== input) { e.preventDefault(); input.focus(); }
    if (e.key === 'Escape') { if (activePopup) closePopup(); else input.blur(); }
  });
}

window.addEventListener('resize', () => closePopup());
function init() {
  initParticles();
  renderCards();
  bindEvents();
  initSearch();
  window.addEventListener('scroll', () => closePopup(), { passive: true });
}
init();
</script>
</body>
</html>
